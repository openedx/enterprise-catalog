name: Django CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.11']
        django-version: [django42]

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x64
    - name: Start container
      run: |
        docker-compose -f .github/docker-compose-github.yml up -d
    - name: Install test dependencies and run validation
      run: |
        if [[ "${{ matrix.python-version }}" == '3.8' ]]; then
          tox_env="py38-${{ matrix.django-version }}"
        elif [[ "${{ matrix.python-version }}" == '3.11' ]]; then
          tox_env="py311-${{ matrix.django-version }}"
        fi
        docker exec -e TOXENV="$tox_env" -u root enterprise.catalog.app /edx/app/enterprise_catalog/enterprise_catalog/validate.sh
    - name: Code Coverage
      if: matrix.python-version == '3.8' && matrix.django-version=='django42'
      uses: codecov/codecov-action@v1
