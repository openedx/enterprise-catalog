name: Django CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.11']
        tox-env: [django42]

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x64
    - name: Start container
      run: |
        docker-compose -f .github/docker-compose-github.yml up -d
    - name: Install test dependencies and run validation
      run: |
        docker exec -e TOXENV="${{ matrix.tox-env }}" -u root enterprise.catalog.app /edx/app/enterprise_catalog/enterprise_catalog/validate.sh
    - name: Code Coverage
      if: matrix.python-version == '3.8' && matrix.tox-env=='django42'
      uses: codecov/codecov-action@v1
